<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flash &amp; Prints — Who Are You Today?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="responsive.css"/>
<style>
  :root{
    --gold:#E8C547; --gold-dim:#C8A030; --gold-faint:rgba(232,197,71,0.08);
    --rose:#C84B6E; --sage:#3DAA6C;
    --charcoal:#111118; --charcoal2:#1A1A26; --charcoal3:#20202E;
    --ink:#0A0A12; --border:rgba(255,255,255,0.07); --faint:rgba(255,255,255,0.04);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    width:100vw; height:100vh; overflow:hidden;
    background:var(--ink); font-family:'DM Sans',sans-serif;
    cursor:none; user-select:none;
  }

  /* ── background ── */
  .bg{
    position:absolute; inset:0;
    background:radial-gradient(ellipse 900px 700px at 50% 20%, #0E0E1C 0%, #0A0A12 60%);
    transition:background 0.6s ease;
  }
  .bg-grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size:60px 60px;
    transition:background-image 0.6s ease;
  }
  .bg-glow{
    position:absolute; width:800px; height:600px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
    top:-100px; left:50%; transform:translateX(-50%);
    transition:background 0.6s ease;
    animation:glowPulse 5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes glowPulse{ 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* ── topbar ── */
  .topbar{
    position:absolute; top:0; left:0; right:0; height:100px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 56px; z-index:30;
    background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }
  .brand{ font-family:'Playfair Display',serif; font-weight:900; font-size:20px; color:#fff; }
  .brand em{ color:var(--gold); font-style:normal; }
  .step-indicator{ display:flex; align-items:center; gap:8px; }
  .step-dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.12); transition:all 0.3s; }
  .step-dot.done{ background:var(--sage); }
  .step-dot.active{ background:var(--gold); width:28px; border-radius:5px; }
  .step-line{ width:24px; height:1px; background:rgba(255,255,255,0.08); }
  .topbar-clock{ font-family:'Space Mono',monospace; font-size:14px; color:rgba(255,255,255,0.3); }

  /* ── main layout ── */
  .main{
    position:absolute; top:100px; left:0; right:0; bottom:0;
    display:flex; flex-direction:column; align-items:center;
    padding:52px 56px 56px; z-index:10;
    gap:0;
  }

  /* ── title section ── */
  .title-section{
    text-align:center;
    animation:slideDown 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
    margin-bottom:44px;
  }
  @keyframes slideDown{ from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  .eyebrow{
    font-family:'Space Mono',monospace; font-size:11px; letter-spacing:4px;
    color:var(--gold); text-transform:uppercase; opacity:0.7; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center; gap:12px;
  }
  .eyebrow::before,.eyebrow::after{
    content:''; display:inline-block; width:28px; height:1px; background:var(--gold); opacity:0.4;
  }
  .title{
    font-family:'Playfair Display',serif; font-size:56px; font-weight:900;
    color:#fff; line-height:1.1; letter-spacing:-1px; margin-bottom:14px;
  }
  .title em{ color:var(--gold); font-style:italic; }
  .subtitle{
    font-size:16px; color:rgba(255,255,255,0.35); font-weight:400; letter-spacing:0.3px;
  }

  /* ── mood grid ── */
  .mood-grid{
    display:grid; grid-template-columns:1fr 1fr;
    gap:20px; width:100%;
    animation:fadeUp 0.5s 0.15s both;
    margin-bottom:40px;
  }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  /* ── mood card ── */
  .mood-card{
    position:relative; border-radius:22px;
    background:var(--charcoal2);
    border:1.5px solid rgba(255,255,255,0.07);
    padding:28px 20px 24px;
    display:flex; flex-direction:column; align-items:center; gap:12px;
    cursor:pointer; overflow:hidden;
    transition:transform 0.2s ease, border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
  }
  .mood-card::before{
    content:''; position:absolute; inset:0;
    opacity:0; transition:opacity 0.3s ease;
    border-radius:inherit;
  }
  .mood-card:active{ transform:scale(0.97); }

  /* glow on hover */
  .mood-card:hover{
    transform:translateY(-4px) scale(1.02);
    border-color:rgba(255,255,255,0.18);
  }
  .mood-card:hover::before{ opacity:0.06; }

  /* selected state */
  .mood-card.selected{
    transform:translateY(-4px) scale(1.03);
    border-width:2px;
    animation:cardSelected 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  .mood-card.selected::before{ opacity:0.1; }
  @keyframes cardSelected{
    0%{ transform:translateY(0) scale(1); }
    60%{ transform:translateY(-6px) scale(1.05); }
    100%{ transform:translateY(-4px) scale(1.03); }
  }

  /* selected check mark */
  .mood-card .check{
    position:absolute; top:12px; right:14px;
    width:24px; height:24px; border-radius:50%;
    background:transparent; border:1.5px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:transparent;
    transition:all 0.25s ease;
  }
  .mood-card.selected .check{
    background:var(--mood-color, var(--gold));
    border-color:var(--mood-color, var(--gold));
    color:#fff;
  }

  .mood-emoji{
    font-size:52px; line-height:1;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    transition:transform 0.2s ease;
  }
  .mood-card:hover .mood-emoji,
  .mood-card.selected .mood-emoji{ transform:scale(1.12); }

  .mood-label{
    font-family:'DM Sans',sans-serif; font-size:17px; font-weight:600;
    color:#fff; text-align:center; letter-spacing:0.2px;
    transition:color 0.3s ease;
  }
  .mood-card.selected .mood-label{ color:var(--mood-color, var(--gold)); }

  /* individual mood colors applied via JS */

  /* ── prompt area ── */
  .prompt-area{
    width:100%; text-align:center;
    min-height:68px; display:flex; align-items:center; justify-content:center;
    animation:fadeUp 0.5s 0.25s both;
    margin-bottom:36px;
  }
  .prompt-text{
    font-size:19px; font-weight:500;
    color:rgba(255,255,255,0.5);
    letter-spacing:0.3px;
    transition:all 0.4s ease;
    font-style:italic;
  }
  .prompt-text.active{
    color:rgba(255,255,255,0.82);
    font-style:normal;
  }

  /* ── continue button ── */
  .continue-btn{
    position:relative; overflow:hidden;
    width:100%; height:96px; border-radius:20px;
    border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--gold-dim), var(--gold));
    display:flex; align-items:center; justify-content:center; gap:12px;
    transition:all 0.25s ease;
    animation:fadeUp 0.5s 0.3s both;
  }
  .continue-btn:disabled{
    background:rgba(255,255,255,0.06);
    cursor:not-allowed;
    opacity:0.5;
  }
  .continue-btn:not(:disabled):hover{
    transform:translateY(-3px);
    box-shadow:0 16px 48px rgba(232,197,71,0.3);
  }
  .continue-btn:not(:disabled):active{ transform:scale(0.98); }
  .btn-shine{
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    transform:translateX(-150%);
    animation:none;
  }
  .continue-btn:not(:disabled) .btn-shine{
    animation:shine 3s ease-in-out 1s infinite;
  }
  @keyframes shine{
    0%{ transform:translateX(-150%); }
    40%{ transform:translateX(150%); }
    100%{ transform:translateX(150%); }
  }
  .btn-text{
    font-family:'Playfair Display',serif; font-size:24px; font-weight:700;
    color:#1A1200; position:relative; z-index:1;
  }
  .continue-btn:disabled .btn-text{ color:rgba(255,255,255,0.2); }
  .btn-arrow{
    font-size:22px; position:relative; z-index:1;
    transition:transform 0.2s ease;
  }
  .continue-btn:not(:disabled):hover .btn-arrow{ transform:translateX(6px); }

  /* ── ripple ── */
  .ripple{
    position:fixed; border-radius:50%; background:rgba(255,255,255,0.15);
    pointer-events:none; animation:rippleOut 0.5s ease-out forwards; z-index:100;
    transform:translate(-50%,-50%) scale(0);
  }
  @keyframes rippleOut{ to{transform:translate(-50%,-50%) scale(5);opacity:0} }
</style>
</head>
<body>
<script src="network-monitor.js"></script>
<script src="fp-bridge.js"></script>
<script src="booth-reporter.js"></script>
<script src="error-overlay.js"></script>

<div class="bg" id="bg"></div>
<div class="bg-grid" id="bgGrid"></div>
<div class="bg-glow" id="bgGlow"></div>

<!-- topbar -->
<div class="topbar">
  <div class="brand"><em>Flash</em> &amp; Prints</div>
  <div class="step-indicator">
    <div class="step-dot done"></div><div class="step-line"></div>
    <div class="step-dot done"></div><div class="step-line"></div>
    <div class="step-dot done"></div><div class="step-line"></div>
    <div class="step-dot active"></div><div class="step-line"></div>
    <div class="step-dot"></div><div class="step-line"></div>
    <div class="step-dot"></div>
  </div>
  <div class="topbar-clock" id="clock">--:-- --</div>
</div>

<div class="main">

  <!-- title -->
  <div class="title-section">
    <div class="eyebrow">step 4 of 6 · vibe check</div>
    <h1 class="title">Who Are You <em>Today?</em></h1>
    <p class="subtitle">Pick your mood and we'll set the scene ✨</p>
  </div>

  <!-- mood grid -->
  <div class="mood-grid" id="moodGrid"></div>

  <!-- prompt -->
  <div class="prompt-area">
    <p class="prompt-text" id="promptText">Choose a mood to unlock your vibe 🎭</p>
  </div>

  <!-- continue -->
  <button class="continue-btn" id="continueBtn" disabled onclick="handleContinue(event)">
    <div class="btn-shine"></div>
    <span class="btn-text">Continue</span>
    <span class="btn-arrow">→</span>
  </button>

</div>

<script>
/* ── mood definitions ── */
const MOODS = [
  {
    id:      'heartbroken',
    emoji:   '💔',
    label:   'Heartbroken',
    color:   '#C84B6E',
    bgFrom:  '#1A0B10',
    glow:    'rgba(200,75,110,0.12)',
    grid:    'rgba(200,75,110,0.028)',
    filter:  'saturate(0.65) sepia(0.25) brightness(0.88)',
    prompt:  'Let it out — the camera sees your beauty 💜',
  },
  {
    id:      'confident',
    emoji:   '😎',
    label:   'Confident',
    color:   '#E8C547',
    bgFrom:  '#121008',
    glow:    'rgba(232,197,71,0.12)',
    grid:    'rgba(232,197,71,0.028)',
    filter:  'contrast(1.2) brightness(1.05) saturate(1.2)',
    prompt:  'Own every frame. You look incredible 🔥',
  },
  {
    id:      'stressed_student',
    emoji:   '📚',
    label:   'Stressed Student',
    color:   '#60A5FA',
    bgFrom:  '#080C1A',
    glow:    'rgba(96,165,250,0.12)',
    grid:    'rgba(96,165,250,0.028)',
    filter:  'saturate(0.8) brightness(0.9) hue-rotate(200deg)',
    prompt:  'Take a breath. You deserve this break 📖',
  },
  {
    id:      'in_love',
    emoji:   '💘',
    label:   'In Love',
    color:   '#EC4899',
    bgFrom:  '#180A12',
    glow:    'rgba(236,72,153,0.12)',
    grid:    'rgba(236,72,153,0.028)',
    filter:  'saturate(1.4) sepia(0.2) hue-rotate(-20deg) brightness(1.05)',
    prompt:  'Glow up, babe. Show that feeling 💕',
  },
  {
    id:      'sleep_deprived',
    emoji:   '💤',
    label:   'Sleep Deprived',
    color:   '#818CF8',
    bgFrom:  '#0A0A1A',
    glow:    'rgba(129,140,248,0.12)',
    grid:    'rgba(129,140,248,0.028)',
    filter:  'saturate(0.45) brightness(0.78) sepia(0.2)',
    prompt:  'Still gorgeous, even half-asleep 😴',
  },
  {
    id:      'main_character',
    emoji:   '🔥',
    label:   'Main Character',
    color:   '#FB923C',
    bgFrom:  '#140A04',
    glow:    'rgba(251,146,60,0.12)',
    grid:    'rgba(251,146,60,0.028)',
    filter:  'contrast(1.3) saturate(1.5) brightness(1.08)',
    prompt:  'Act like the main character 🎬',
  },
];

let selectedMood = null;

/* ── render cards ── */
const grid = document.getElementById('moodGrid');
MOODS.forEach(mood => {
  const card = document.createElement('div');
  card.className = 'mood-card';
  card.dataset.id = mood.id;
  card.style.setProperty('--mood-color', mood.color);
  card.innerHTML = `
    <div class="check">✓</div>
    <div class="mood-emoji">${mood.emoji}</div>
    <div class="mood-label">${mood.label}</div>
  `;
  card.addEventListener('click', (e) => selectMood(mood, card, e));
  grid.appendChild(card);
});

/* ── select mood ── */
function selectMood(mood, cardEl, e) {
  addRipple(e);

  /* deselect previous */
  document.querySelectorAll('.mood-card.selected').forEach(c => c.classList.remove('selected'));

  /* select this card */
  cardEl.classList.add('selected');
  selectedMood = mood.id;

  /* update prompt */
  const promptEl = document.getElementById('promptText');
  promptEl.textContent = mood.prompt;
  promptEl.classList.add('active');

  /* update background */
  applyMoodBackground(mood);

  /* enable continue */
  document.getElementById('continueBtn').disabled = false;

  if (typeof fpResetIdle === 'function') fpResetIdle();
}

function applyMoodBackground(mood) {
  document.getElementById('bg').style.background =
    `radial-gradient(ellipse 900px 700px at 50% 20%, ${mood.bgFrom} 0%, #0A0A12 60%)`;
  document.getElementById('bgGlow').style.background =
    `radial-gradient(circle, ${mood.glow} 0%, transparent 70%)`;
  document.getElementById('bgGrid').style.backgroundImage =
    `linear-gradient(${mood.grid} 1px, transparent 1px),`+
    `linear-gradient(90deg, ${mood.grid} 1px, transparent 1px)`;
}

/* ── continue ── */
function handleContinue(e) {
  if (!selectedMood) return;
  addRipple(e);

  const moodData = MOODS.find(m => m.id === selectedMood);

  /* fade out */
  const fade = document.createElement('div');
  fade.style.cssText = 'position:fixed;inset:0;background:#fff;opacity:0;z-index:9999;pointer-events:none;transition:opacity 0.2s;';
  document.body.appendChild(fade);
  requestAnimationFrame(() => { fade.style.opacity = '0.8'; });

  setTimeout(() => {
    if (typeof fpNavigate === 'function') {
      fpNavigate('camera', {
        selectedMood,
        moodFilter:  moodData ? moodData.filter : '',
        moodPrompt:  moodData ? moodData.prompt : '',
        moodColor:   moodData ? moodData.color  : '',
      });
    } else {
      window.location.href = 'camera.html';
    }
  }, 220);
}

/* ── ripple ── */
function addRipple(e) {
  const r = document.createElement('div');
  r.className = 'ripple';
  const size = 80;
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX}px;top:${e.clientY}px;`;
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

/* ── clock ── */
function updateClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ' ' + ap;
}
updateClock(); setInterval(updateClock, 1000);
</script>
</body>
</html>
